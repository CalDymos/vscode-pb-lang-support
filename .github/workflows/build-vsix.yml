name: Build VSIX (for Marketplace Upload)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, SHA) to build"
        required: true
        default: "main"
        type: string
  push:
    tags:
      - "suite-v*"
      - "lang-v*"
      - "forms-v*"
      - "pbp-v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [pb-lang-support, pb-forms-editor, pb-project-files]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check if this pkg should build
        id: should_build
        run: |
          TAG="${{ github.ref_name }}"
          PKG="${{ matrix.pkg }}"
          # workflow_dispatch has no tag → always build all
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == suite-v*  ]] || \
               [[ "$TAG" == lang-v*   && "$PKG" == "pb-lang-support"  ]] || \
               [[ "$TAG" == forms-v*  && "$PKG" == "pb-forms-editor"  ]] || \
               [[ "$TAG" == pbp-v*    && "$PKG" == "pb-project-files" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (workspaces)
        if: steps.should_build.outputs.run == 'true'
        run: npm ci

      - name: Build pb-project-core
        if: steps.should_build.outputs.run == 'true'
        run: npm -w packages/pb-project-core run build

      - name: Compile (${{ matrix.pkg }})
        if: steps.should_build.outputs.run == 'true'
        run: npm -w packages/${{ matrix.pkg }} run compile

      - name: Build bundle (${{ matrix.pkg }})
        if: steps.should_build.outputs.run == 'true' && (matrix.pkg == 'pb-lang-support' || matrix.pkg == 'pb-project-files')
        run: npm -w packages/${{ matrix.pkg }} run webpack:prod

      - name: Package VSIX (${{ matrix.pkg }})
        if: steps.should_build.outputs.run == 'true'
        run: npx @vscode/vsce package --no-dependencies --out ${{ matrix.pkg }}.vsix
        working-directory: packages/${{ matrix.pkg }}

      - name: Upload VSIX artifact
        if: steps.should_build.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.pkg }}
          path: packages/${{ matrix.pkg }}/${{ matrix.pkg }}.vsix